name: memos_note
description: "Memos - Open source note taking app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # HTTP & API
  dio: ^5.7.0

  # Local storage & offline
  sqflite: ^2.3.3+1
  path: ^1.9.0
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.0.5

  # Markdown & HTML
  flutter_markdown: ^0.7.3+1
  markdown: ^7.2.2
  flutter_html: ^3.0.0-beta.2

  # UI
  cached_network_image: ^3.4.1
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  timeago: ^3.7.0
  share_plus: ^10.0.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2

  # Deep link
  app_links: ^6.3.2

  # JSON serialization
  json_annotation: ^4.9.0

  # Secure storage for tokens
  flutter_secure_storage: ^9.2.2
  file_picker: ^10.3.10
  flutter_native_splash: ^2.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/mos_notes_icon.png"
  adaptive_icon_background: "#E87722"
  adaptive_icon_foreground: "assets/images/mos_notes_icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#E87722"
  image: assets/images/mos_notes_icon.png
  color_dark: "#1a1a1a"
  image_dark: assets/images/mos_notes_icon.png
  android: true
  ios: true
  web: true
  android_gravity: center
  ios_content_mode: center
  fullscreen: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
